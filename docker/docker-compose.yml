services:
  arangodb:
    image: arangodb/arangodb:3.12
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGO_ROOT_PASSWORD}
    volumes:
      - arangodata:/var/lib/arangodb3
    networks:
      - aletheia-network

networks:
  aletheia-network:
    driver: bridge

volumes:
  arangodata:
